<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PatternGuard — Detección Temprana de Riesgo Estudiantil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --background:#f0f3f8; --foreground:#1a2638; --card:#ffffff;
    --primary:#1e3a5f; --primary-foreground:#ffffff;
    --secondary:#e6ecf4; --secondary-foreground:#2d4a6b;
    --muted:#edf1f7; --muted-foreground:#5c738f;
    --accent:#2563eb; --accent-foreground:#ffffff;
    --destructive:#b91c1c; --border:rgba(30,58,95,0.1);
    --sidebar:#1e3a5f; --sidebar-foreground:#e2eaf5; --sidebar-accent:#16304f;
    --chart-1:#2563eb; --chart-2:#7c3aed; --chart-3:#059669; --chart-4:#d97706; --chart-5:#dc2626;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{background:var(--background);color:var(--foreground);font-family:'Outfit',system-ui,sans-serif;font-size:15px;-webkit-font-smoothing:antialiased;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  h1,h2{font-weight:600;margin:0;}
  p{margin:0;}
  button,select,input,textarea{font-family:inherit;}
  svg.icon{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}

  .layout{display:flex;height:100vh;overflow:hidden;}

  /* SIDEBAR */
  .sidebar{width:210px;flex-shrink:0;background:var(--sidebar);color:var(--sidebar-foreground);display:flex;flex-direction:column;}
  .sb-head{padding:16px;border-bottom:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;gap:10px;}
  .sb-logo{width:32px;height:32px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .sb-logo svg{stroke:#fff;width:15px;height:15px;}
  .sb-title{font-size:13px;font-weight:600;color:#fff;line-height:1.2;}
  .sb-sub{font-size:10px;color:rgba(226,234,245,0.6);line-height:1.2;}
  .sb-nav{flex:1;padding:10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
  .sb-btn{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;font-size:14px;background:none;border:none;color:rgba(226,234,245,0.7);cursor:pointer;text-align:left;width:100%;transition:background .15s,color .15s;}
  .sb-btn:hover{background:rgba(255,255,255,0.08);color:#fff;}
  .sb-btn.active{background:rgba(255,255,255,0.15);color:#fff;}
  .sb-btn .badge-count{margin-left:auto;font-size:10px;font-family:'IBM Plex Mono',monospace;background:rgba(255,255,255,0.2);color:#fff;padding:2px 6px;border-radius:20px;}
  .sb-foot{padding:14px;border-top:1px solid rgba(255,255,255,0.1);font-size:10px;color:rgba(226,234,245,0.6);line-height:1.5;}

  /* MOBILE TABS */
  .mtabs{display:none;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;}
  .mtabs-inner{display:flex;gap:4px;padding:8px;min-width:max-content;}
  .mtabs button{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:8px;font-size:12px;background:none;border:none;color:var(--muted-foreground);white-space:nowrap;cursor:pointer;}
  .mtabs button.active{background:var(--primary);color:#fff;}

  /* MAIN */
  main{flex:1;overflow-y:auto;padding:20px 28px 48px;}
  .container{max-width:980px;margin:0 auto;}
  .view{display:none;flex-direction:column;gap:20px;}
  .view.active{display:flex;}

  /* CARD */
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;}
  .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;color:var(--muted-foreground);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;}
  .view-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
  .view-head h2{font-size:16px;}
  .pill{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--muted-foreground);background:var(--muted);padding:4px 10px;border-radius:8px;}

  /* HERO (inicio) */
  .hero-card{display:flex;align-items:flex-start;gap:14px;}
  .hero-icon{width:44px;height:44px;border-radius:10px;background:#eff6ff;border:1px solid #bfdbfe;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .hero-icon svg{width:20px;height:20px;stroke:#1d4ed8;}
  .hero-card h1{font-size:17px;}
  .hero-card .hs{font-size:12px;color:var(--muted-foreground);margin-top:2px;}
  .hero-card .lead{font-size:13.5px;color:var(--muted-foreground);margin-top:14px;line-height:1.7;max-width:64ch;}
  .kw{color:#1d4ed8;font-family:'IBM Plex Mono',monospace;font-size:11.5px;background:#eff6ff;padding:2px 6px;border-radius:5px;border:1px solid #bfdbfe;}

  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:15px;}
  .stat-card .lbl{display:flex;align-items:center;gap:6px;font-size:10px;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;}
  .stat-card .val{font-size:22px;font-weight:600;font-family:'IBM Plex Mono',monospace;}

  .flow{display:flex;flex-wrap:wrap;gap:8px 12px;align-items:center;}
  .flow-step{display:flex;align-items:center;gap:8px;font-size:13px;}
  .flow-step .n{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--accent);}
  .flow-chev{width:11px;height:11px;stroke:var(--border);stroke:#c7cfdb;}

  .duo{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .algo-card .bar{width:6px;height:16px;border-radius:6px;display:inline-block;margin-right:8px;vertical-align:-3px;}
  .algo-card .title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;font-family:'IBM Plex Mono',monospace;}
  .algo-card .desc{font-size:12.5px;color:var(--muted-foreground);line-height:1.7;margin-top:10px;}

  .ethics-note{border:1px solid #fcd34d;background:#fffbeb;border-radius:12px;padding:16px;display:flex;gap:12px;align-items:flex-start;}
  .ethics-note svg{stroke:#b45309;width:17px;height:17px;margin-top:2px;}
  .ethics-note .t{font-size:12.5px;font-weight:600;color:#b45309;margin-bottom:4px;}
  .ethics-note .d{font-size:12.5px;color:var(--muted-foreground);line-height:1.6;}

  /* MENSAJES */
  .note-box{background:var(--secondary);border:1px solid var(--border);border-radius:10px;padding:14px 16px;font-size:13px;color:var(--secondary-foreground);display:flex;gap:10px;align-items:center;}
  .msg-list{display:flex;flex-direction:column;gap:6px;max-height:520px;overflow-y:auto;}
  .msg-row{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:11px 14px;display:flex;gap:12px;align-items:flex-start;}
  .msg-row .num{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted-foreground);width:24px;flex-shrink:0;padding-top:2px;}
  .msg-row .txt{font-size:13.5px;line-height:1.6;color:var(--foreground);}
  .src-tag{display:inline-block;margin-top:6px;font-size:10.5px;font-family:'IBM Plex Mono',monospace;color:#1d4ed8;background:#eff6ff;border:1px solid #bfdbfe;padding:1.5px 7px;border-radius:5px;}

  /* PATRONES */
  .filter-row{display:flex;gap:6px;flex-wrap:wrap;}
  .chip{font-family:'IBM Plex Mono',monospace;font-size:11.5px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--muted-foreground);cursor:pointer;}
  .chip.active{background:var(--primary);color:#fff;border-color:var(--primary);}
  .tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:12px;}
  table{width:100%;min-width:680px;border-collapse:collapse;}
  thead{background:var(--muted);}
  th{text-align:left;padding:10px 14px;font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--muted-foreground);text-transform:uppercase;letter-spacing:.05em;font-weight:400;border-bottom:1px solid var(--border);}
  td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:12.5px;vertical-align:top;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:rgba(37,99,235,0.03);}
  .pat-text{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:#1d4ed8;}
  .badge{display:inline-flex;align-items:center;gap:5px;font-family:'IBM Plex Mono',monospace;font-size:11px;padding:2px 9px;border-radius:20px;border:1px solid;white-space:nowrap;}
  .badge .dot{width:6px;height:6px;border-radius:50%;}
  .badge.Alto{background:#fef2f2;color:#b91c1c;border-color:#fecaca;} .badge.Alto .dot{background:#dc2626;}
  .badge.Medio{background:#fffbeb;color:#b45309;border-color:#fde68a;} .badge.Medio .dot{background:#d97706;}
  .badge.Bajo{background:#ecfdf5;color:#047857;border-color:#a7f3d0;} .badge.Bajo .dot{background:#059669;}
  .badge.Ninguno{background:var(--muted);color:var(--muted-foreground);border-color:var(--border);} .badge.Ninguno .dot{background:#94a3b8;}

  /* EJECUTAR */
  .radio-opt{display:flex;align-items:flex-start;gap:10px;padding:11px;border-radius:8px;border:1px solid var(--border);cursor:pointer;margin-bottom:8px;}
  .radio-opt.sel{border-color:#93c5fd;background:#eff6ff;}
  .radio-opt input{margin-top:3px;accent-color:var(--accent);}
  .radio-opt .t{font-size:13.5px;font-weight:500;}
  .radio-opt .d{font-size:11px;color:var(--muted-foreground);margin-top:2px;}
  .check-opt{display:flex;align-items:flex-start;gap:10px;padding:12px;border-radius:8px;border:1px solid var(--border);cursor:pointer;}
  .check-opt.sel{border-color:#6ee7b7;background:#ecfdf5;}
  .check-opt input{margin-top:3px;accent-color:#059669;}
  .exec-summary div{display:flex;justify-content:space-between;font-size:12.5px;padding:5px 0;color:var(--muted-foreground);}
  .exec-summary span.v{font-family:'IBM Plex Mono',monospace;color:var(--foreground);}
  .run-btn{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-weight:600;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s;}
  .run-btn:hover{background:#1d4ed8;}
  .run-btn:disabled{opacity:.45;cursor:default;}
  .run-ok{border:1px solid #6ee7b7;background:#ecfdf5;border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--muted-foreground);}
  .run-ok svg{stroke:#047857;}
  .run-ok a{color:#1d4ed8;cursor:pointer;text-decoration:underline;}

  /* RESULTADOS */
  .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:90px 20px;text-align:center;color:var(--muted-foreground);}
  .empty svg{stroke:var(--muted-foreground);width:26px;height:26px;margin-bottom:10px;}
  .empty a{color:#1d4ed8;cursor:pointer;margin-top:8px;font-size:13px;text-decoration:underline;}
  .res-filters{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap;}
  .res-filters select,.res-filters button{font-size:12px;padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--muted-foreground);}
  .res-filters button.on{border-color:#93c5fd;background:#eff6ff;color:#1d4ed8;}
  .showing{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--muted-foreground);}
  .alert-card{border-radius:12px;padding:14px 16px;display:flex;flex-direction:column;gap:10px;border:1px solid;}
  .alert-card.Alto{border-color:#fecaca;background:rgba(254,242,242,0.5);}
  .alert-card.Medio{border-color:#fde68a;background:rgba(255,251,235,0.5);}
  .alert-card.Bajo{border-color:#a7f3d0;background:rgba(236,253,245,0.5);}
  .alert-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;}
  .alert-msg{font-size:13.5px;line-height:1.6;}
  .alert-msg mark{background:#fef08a;color:#713f12;border-radius:4px;padding:0 2px;font-weight:500;}
  .alert-meta{font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--muted-foreground);flex-shrink:0;}
  .alert-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
  .alert-grid .g{background:#fafbfc;border:1px solid #f1f3f6;border-radius:7px;padding:8px 10px;}
  .alert-grid .g .l{font-size:9.5px;color:var(--muted-foreground);}
  .alert-grid .g .v{font-size:12px;margin-top:3px;}
  .alert-sugg{border-top:1px solid var(--border);padding-top:10px;display:flex;gap:8px;align-items:flex-start;font-size:12.5px;color:var(--muted-foreground);}
  .alert-sugg svg{stroke:#047857;width:13px;height:13px;margin-top:2px;flex-shrink:0;}

  /* ESTADISTICAS */
  .bar-chart{display:flex;align-items:flex-end;gap:10px;height:170px;padding-top:10px;}
  .bar-chart .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end;}
  .bar-chart .b{width:100%;border-radius:5px 5px 0 0;min-height:3px;}
  .bar-chart .lab{font-size:9.5px;color:var(--muted-foreground);text-align:center;line-height:1.2;}
  .bar-chart .cnt{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--foreground);}
  .donut-wrap{display:flex;align-items:center;gap:22px;justify-content:center;flex-wrap:wrap;}
  .legend{display:flex;flex-direction:column;gap:8px;}
  .legend .li{display:flex;align-items:center;gap:8px;font-size:12px;}
  .legend .sw{width:10px;height:10px;border-radius:3px;}
  .lim-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .lim-item{display:flex;gap:9px;align-items:flex-start;}
  .lim-item svg{stroke:#b45309;width:13px;height:13px;margin-top:2px;flex-shrink:0;}
  .lim-item .t{font-size:12.5px;font-weight:600;}
  .lim-item .d{font-size:11.5px;color:var(--muted-foreground);margin-top:2px;line-height:1.5;}

  @media (max-width:860px){
    .sidebar{display:none;}
    .mtabs{display:block;}
    main{padding:16px;}
    .stat-grid,.duo,.lim-grid{grid-template-columns:1fr 1fr;}
    .alert-grid{grid-template-columns:1fr 1fr;}
  }
  @media (max-width:520px){
    .stat-grid,.duo,.lim-grid,.alert-grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<div class="layout">
  <aside class="sidebar">
    <div class="sb-head">
      <div class="sb-logo"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/></svg></div>
      <div><div class="sb-title">PatternGuard</div><div class="sb-sub">KMP · Boyer–Moore</div></div>
    </div>
    <nav class="sb-nav" id="sbNav"></nav>
    <div class="sb-foot">Prototipo educativo EDAII<br>Uso exclusivamente académico y demostrativo</div>
  </aside>

  <div style="flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;">
    <div class="mtabs"><div class="mtabs-inner" id="mNav"></div></div>
    <main><div class="container" id="mainContainer"></div></main>
  </div>
</div>

<script>
/* ============================================================
   ICONOS (svg inline, estilo lucide)
   ============================================================ */
const ICONS = {
  home:'<path d="m3 11 9-8 9 8"/><path d="M5 10v10h14V10"/>',
  file:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/>',
  settings:'<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 0 1-4 0v-.1A1.7 1.7 0 0 0 9 19.4a1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.5-1H3a2 2 0 0 1 0-4h.1A1.7 1.7 0 0 0 4.6 9a1.7 1.7 0 0 0-.3-1.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.9.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 0 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.9-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 0 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1Z"/>',
  play:'<polygon points="6 3 20 12 6 21 6 3"/>',
  search:'<circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>',
  bar:'<line x1="18" x2="18" y1="20" y2="10"/><line x1="12" x2="12" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="14"/>',
  chevron:'<path d="m9 18 6-6-6-6"/>',
  alert:'<path d="m21.7 18-8-14a2 2 0 0 0-3.4 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.7-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/>',
  check:'<path d="M20 6 9 17l-5-5"/>',
  x:'<path d="M18 6 6 18"/><path d="m6 6 12 12"/>',
  clock:'<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',
  activity:'<path d="M22 12h-4l-3 9L9 3l-3 9H2"/>',
  zap:'<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>',
  msg:'<path d="M21 11.5a8.4 8.4 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.4 8.4 0 0 1-3.8-.9L3 21l1.9-5.7a8.4 8.4 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.4 8.4 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5Z"/>'
};
function icon(name, cls){ return `<svg class="icon ${cls||''}" viewBox="0 0 24 24">${ICONS[name]}</svg>`; }

/* ============================================================
   DATOS DINÁMICOS CARGADOS DESDE FLASK (CSV y TXT)
   ============================================================ */
const patronesData = {{ patrones_json | tojson | safe }};
const mensajesData = {{ mensajes_json | tojson | safe }};
const CATEGORIAS = [...new Set(patronesData.map(p=>p.categoria))];

/* ============================================================
   ESTADO
   ============================================================ */
const state = {
  tab: 'inicio',
  algo: 'both',
  useNorm: true,
  results: [],
  showAll: true,
  alertFilter: 'all',
  catFilter: 'all',
  patFilter: '__all__'
};

const NAV_ITEMS = [
  {id:'inicio', label:'Inicio', icon:'home'},
  {id:'mensajes', label:'Mensajes', icon:'file'},
  {id:'patrones', label:'Patrones', icon:'settings'},
  {id:'ejecutar', label:'Ejecutar', icon:'play'},
  {id:'resultados', label:'Resultados', icon:'search'},
  {id:'estadisticas', label:'Estadísticas', icon:'bar'},
];

function renderNav(){
  document.getElementById('sbNav').innerHTML = NAV_ITEMS.map(it=>`
    <button class="sb-btn ${state.tab===it.id?'active':''}" data-tab="${it.id}">
      ${icon(it.icon)}<span>${it.label}</span>
      ${it.id==='resultados' && state.results.filter(r=>r.detected).length>0 ? `<span class="badge-count">${state.results.filter(r=>r.detected).length}</span>` : ''}
    </button>`).join('');
  document.getElementById('mNav').innerHTML = NAV_ITEMS.map(it=>`
    <button class="${state.tab===it.id?'active':''}" data-tab="${it.id}">${icon(it.icon)}${it.label}</button>`).join('');
  document.querySelectorAll('[data-tab]').forEach(b=>b.addEventListener('click', ()=>{state.tab=b.dataset.tab; render();}));
}

function badge(nivel){
  return `<span class="badge ${nivel}"><span class="dot"></span>${nivel}</span>`;
}

function normalizarParaHighlight(texto){
  let t = texto.toLowerCase();
  const reemplazos = {'á':'a','é':'e','í':'i','ó':'o','ú':'u','ü':'u'};
  for(const o in reemplazos) t = t.split(o).join(reemplazos[o]);
  const signos = [',','.',';',':','¡','!','¿','?','"','(',')','-','_'];
  for(const s of signos) t = t.split(s).join(' ');
  return t.split(/\s+/).filter(Boolean).join(' ');
}

/* ---------- VISTA: INICIO ---------- */
function viewInicio(){
  const detectedCount = state.results.filter(r=>r.detected).length;
  return `
    <div class="card hero-card">
      <div class="hero-icon">${icon('home').replace('icon','').replace('viewBox="0 0 24 24"','viewBox="0 0 24 24" style="width:20px;height:20px;stroke:#1d4ed8"')}</div>
      <div>
        <h1>PatternGuard — Detección Temprana de Riesgo</h1>
        <p class="hs">Sistema educativo · Algoritmos KMP y Boyer–Moore · Proyecto Final EDAII · EPN</p>

/* ---------- VISTA: RESULTADOS ---------- */
function highlightMatch(text, patternText){
  const normText = normalizarParaHighlight(text);
  const normPat = normalizarParaHighlight(patternText);
  const idx = normText.indexOf(normPat);
  if(idx===-1) return text;
  const re = new RegExp('('+patternText.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','i');
  if(re.test(text)) return text.replace(re, '<mark>$1</mark>');
  return text;
}

function viewResultados(){

  const base = state.showAll ? state.results : detected;
  const filtered = base.filter(r=>{
    if(state.alertFilter!=='all' && r.nivel!==state.alertFilter) return false;
    if(state.catFilter!=='all' && r.categoria!==state.catFilter) return false;

  return `

      <h2>Resultados de Detección</h2>

      <table>
        <thead><tr><th>ID</th><th>Mensaje</th><th>Patrón</th><th>Categoría</th><th>¿Detectado?</th><th>Pos.</th><th>KMP</th><th>BM</th></tr></thead>
        <tbody>
          ${filtered.map((r,i)=>`
            <tr style="${r.detected?'':'opacity:.45'}">
              <td class="mono" style="color:var(--muted-foreground)">${String(r.id).padStart(2,'0')}</td>
              <td style="max-width:200px;">${r.mensaje.slice(0,55)}${r.mensaje.length>55?'…':''}</td>
              <td class="pat-text" style="max-width:150px;">${r.detected?`&ldquo;${r.patron}&rdquo;`:'—'}</td>
              <td>${r.categoria}</td>
              <td>${r.detected?`<span style="color:#047857;display:flex;align-items:center;gap:4px;font-size:12px;">${icon('check')} Sí</span>`:`<span style="color:var(--muted-foreground);display:flex;align-items:center;gap:4px;font-size:12px;">${icon('x')} No</span>`}</td>
              <td class="mono" style="color:#047857;font-size:11px;">${r.detected?`[${r.posiciones.join(', ')}]`:'—'}</td>
              <td class="mono" style="font-size:11px;color:#1d4ed8;">${r.kmpComp} comps / ${r.kmpTime.toFixed(4)}ms</td>
              <td class="mono" style="font-size:11px;color:#7c3aed;">${r.bmComp} comps / ${r.bmTime.toFixed(4)}ms</td>
            </tr>`).join('')}

      </table>
    </div>

    ${filtered.filter(r=>r.detected).length>0 ? `
      <div class="eyebrow" style="margin-top:6px;">Alertas detalladas</div>
      <div style="display:flex;flex-direction:column;gap:10px;">
        ${filtered.filter(r=>r.detected).map(r=>`
          <div class="alert-card ${r.nivel}">

/* ---------- VISTA: ESTADISTICAS ---------- */
function viewEstadisticas(){
  if(state.results.length===0){
    return `<div class="empty">${icon('bar')}<p>Ejecuta el análisis para ver estadísticas.</p><a id="goExec2">Ir a Ejecutar →</a></div>`;
  }
  const detected = state.results.filter(r=>r.detected);
  const porCategoria = {};
  const porNivel = {Alto:0, Medio:0, Bajo:0};
  detected.forEach(r=>{ porCategoria[r.categoria]=(porCategoria[r.categoria]||0)+1; porNivel[r.nivel]=(porNivel[r.nivel]||0)+1; });
  const avgKmpComp = Math.round(state.results.reduce((a,b)=>a+b.kmpComp,0)/state.results.length);
  const avgBmComp = Math.round(state.results.reduce((a,b)=>a+b.bmComp,0)/state.results.length);
  const avgKmpTime = state.results.reduce((a,b)=>a+b.kmpTime,0)/state.results.length;
  const avgBmTime = state.results.reduce((a,b)=>a+b.bmTime,0)/state.results.length;

  const catEntries = Object.entries(porCategoria).sort((a,b)=>b[1]-a[1]);
  const maxCat = Math.max(...catEntries.map(e=>e[1]), 1);
  const catColors = ['#2563eb','#7c3aed','#059669','#d97706','#dc2626','#0891b2','#db2777'];

  const nivelColors = {Alto:'#f87171', Medio:'#fbbf24', Bajo:'#34d399'};
  const nivelEntries = Object.entries(porNivel).filter(([,v])=>v>0);
  const totalNivel = nivelEntries.reduce((a,[,v])=>a+v,0) || 1;
  let acc = 0;
  const donutSegs = nivelEntries.map(([k,v])=>{
    const frac = v/totalNivel;
    const seg = {k, v, color: nivelColors[k], offset: acc, frac};
    acc += frac;
    return seg;
  });
  const circumference = 2*Math.PI*34;

  return `
    <h2>Estadísticas y Comparación de Algoritmos</h2>
    <div class="stat-grid">
      <div class="stat-card"><p class="hs" style="font-size:11px;">Mensajes analizados</p><p class="val" style="color:#1d4ed8">${state.results.length}</p></div>
      <div class="stat-card"><p class="hs" style="font-size:11px;">Alertas detectadas</p><p class="val" style="color:#047857">${detected.length}</p></div>
      <div class="stat-card"><p class="hs" style="font-size:11px;">Tasa de detección</p><p class="val" style="color:#7c3aed">${Math.round(detected.length/state.results.length*100)}%</p></div>
      <div class="stat-card"><p class="hs" style="font-size:11px;">Alertas nivel Alto</p><p class="val" style="color:#dc2626">${porNivel.Alto||0}</p></div>
    </div>

    <div class="duo">
      <div class="card">
        <div class="eyebrow">Detecciones por categoría</div>
        <div class="bar-chart">
          ${catEntries.map(([cat,cnt],i)=>`
            <div class="col">
              <span class="cnt">${cnt}</span>
              <div class="b" style="height:${(cnt/maxCat*100).toFixed(0)}%;background:${catColors[i%catColors.length]}"></div>
              <span class="lab">${cat.split(' ').slice(0,2).join(' ')}</span>
            </div>`).join('')}
        </div>
      </div>
      <div class="card">
        <div class="eyebrow">Distribución por nivel de alerta</div>
        <div class="donut-wrap">
          <svg width="130" height="130" viewBox="0 0 90 90">
            <g transform="rotate(-90 45 45)">
              ${donutSegs.map(s=>`<circle cx="45" cy="45" r="34" fill="none" stroke="${s.color}" stroke-width="14"
                stroke-dasharray="${(s.frac*circumference).toFixed(1)} ${circumference.toFixed(1)}"
                stroke-dashoffset="${(-s.offset*circumference).toFixed(1)}" />`).join('')}
            </g>
            <text x="45" y="41" text-anchor="middle" font-size="14" font-weight="600" fill="#1a2638">${detected.length}</text>
            <text x="45" y="55" text-anchor="middle" font-size="7" fill="#5c738f">alertas</text>
          </svg>
          <div class="legend">
            ${nivelEntries.map(([k,v])=>`<div class="li"><span class="sw" style="background:${nivelColors[k]}"></span>${k} — ${v}</div>`).join('')}
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="eyebrow">KMP vs Boyer–Moore — comparación de eficiencia (promedio por mensaje)</div>
      <div class="stat-grid" style="margin-bottom:14px;">
        <div class="stat-card" style="padding:10px 12px;"><p class="hs" style="font-size:10px;">KMP · comparaciones</p><p class="val" style="font-size:16px;color:#1d4ed8">${avgKmpComp}</p></div>
        <div class="stat-card" style="padding:10px 12px;"><p class="hs" style="font-size:10px;">BM · comparaciones</p><p class="val" style="font-size:16px;color:#7c3aed">${avgBmComp}</p></div>
        <div class="stat-card" style="padding:10px 12px;"><p class="hs" style="font-size:10px;">KMP · tiempo</p><p class="val" style="font-size:16px;color:#1d4ed8">${avgKmpTime.toFixed(4)} ms</p></div>
        <div class="stat-card" style="padding:10px 12px;"><p class="hs" style="font-size:10px;">BM · tiempo</p><p class="val" style="font-size:16px;color:#7c3aed">${avgBmTime.toFixed(4)} ms</p></div>
      </div>
      <div class="bar-chart" style="height:100px;">
        <div class="col"><span class="cnt">${avgKmpComp}</span><div class="b" style="height:${Math.max(avgKmpComp,avgBmComp)?(avgKmpComp/Math.max(avgKmpComp,avgBmComp)*100):0}%;background:#2563eb"></div><span class="lab">KMP</span></div>
        <div class="col"><span class="cnt">${avgBmComp}</span><div class="b" style="height:${Math.max(avgKmpComp,avgBmComp)?(avgBmComp/Math.max(avgKmpComp,avgBmComp)*100):0}%;background:#7c3aed"></div><span class="lab">Boyer–Moore</span></div>
      </div>
      <p style="font-size:10.5px;color:var(--muted-foreground);margin-top:10px;line-height:1.6;">Comparaciones y tiempos medidos sobre las búsquedas realmente ejecutadas por el motor de Python.</p>
    </div>

    <div class="card">
      <div class="eyebrow">Limitaciones críticas del sistema</div>
      <div class="lim-grid">
        ${[
          ["Sinónimos","Si el estudiante escribe 'me rindo' en lugar de 'ya no quiero seguir', no hay detección."],
          ["Errores ortográficos","'estoi reprobando' o 'hinternet' — la coincidencia exacta puede fallar sin normalización robusta."],
          ["Ironía y sarcasmo","Un mensaje irónico puede generar falsos negativos o positivos inesperados."],
          ["Falsos positivos","Frases ambiguas pueden activar una alerta sin que exista un riesgo real."],
          ["Contexto semántico","KMP y BM no comprenden significado: solo comparan caracteres secuencialmente."],
          ["Lenguaje regional","Jerga estudiantil o expresiones locales no son detectables sin ampliar el diccionario."]
        ].map(([t,d])=>`
          <div class="lim-item"><svg viewBox="0 0 24 24">${ICONS.alert}</svg><div><div class="t">${t}</div><div class="d">${d}</div></div></div>`).join('')}
      </div>
    </div>
  `;
}

/* ============================================================
   EJECUCIÓN DE LA DETECCIÓN VÍA API DE PYTHON
   ============================================================ */
async function ejecutarDeteccion(){
  const btn = document.getElementById('runBtn');
  if(btn){ btn.disabled = true; btn.innerHTML = `${icon('clock')} Ejecutando en Servidor Python...`; }

  try {
    const response = await fetch('/api/ejecutar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ algo: state.algo, useNorm: state.useNorm })
    });
    
    const data = await response.json();
    state.results = data.resultados;
    state.tab = 'resultados';
    render();
    
  } catch(error) {
    console.error("Error al conectar con Python:", error);
    alert("Ocurrió un error al procesar los algoritmos en el backend.");
  } finally {
    if(btn){ btn.disabled = false; btn.innerHTML = `${icon('play')} Ejecutar detección sobre ${mensajesData.length} mensajes`; }
  }
}

/* ============================================================
   RENDER PRINCIPAL + EVENTOS
   ============================================================ */
function render(){
  renderNav();
  const c = document.getElementById('mainContainer');
  let html = '';
  if(state.tab==='inicio') html = viewInicio();
  else if(state.tab==='mensajes') html = viewMensajes();
  else if(state.tab==='patrones') html = viewPatrones();
  else if(state.tab==='ejecutar') html = viewEjecutar();
  else if(state.tab==='resultados') html = viewResultados();
  else if(state.tab==='estadisticas') html = viewEstadisticas();
  c.innerHTML = `<div class="view active">${html}</div>`;
  bindEvents();
}

function bindEvents(){
  const runBtn = document.getElementById('runBtn');
  if(runBtn) runBtn.addEventListener('click', ejecutarDeteccion);

  document.querySelectorAll('input[name="algo"]').forEach(r=>r.addEventListener('change', e=>{ state.algo=e.target.value; render(); }));
  const chkNorm = document.getElementById('chkNorm');
  if(chkNorm) chkNorm.addEventListener('change', e=>{ state.useNorm=e.target.checked; render(); });

  const goResults = document.getElementById('goResults');
  if(goResults) goResults.addEventListener('click', ()=>{ state.tab='resultados'; render(); });
  const goExec = document.getElementById('goExec'); if(goExec) goExec.addEventListener('click', ()=>{ state.tab='ejecutar'; render(); });
  const goExec2 = document.getElementById('goExec2'); if(goExec2) goExec2.addEventListener('click', ()=>{ state.tab='ejecutar'; render(); });

  const patFilterRow = document.getElementById('patFilterRow');
  if(patFilterRow) patFilterRow.addEventListener('click', e=>{
    if(e.target.classList.contains('chip')){ state.patFilter = e.target.dataset.cat; render(); }
  });

  const toggleShowAll = document.getElementById('toggleShowAll');
  if(toggleShowAll) toggleShowAll.addEventListener('click', ()=>{ state.showAll = !state.showAll; render(); });
  const selAlert = document.getElementById('selAlert');
  if(selAlert){ selAlert.value = state.alertFilter; selAlert.addEventListener('change', e=>{ state.alertFilter=e.target.value; render(); }); }
  const selCat = document.getElementById('selCat');
  if(selCat){ selCat.value = state.catFilter; selCat.addEventListener('change', e=>{ state.catFilter=e.target.value; render(); }); }
}

render();
</script>
